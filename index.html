<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度工作时间统计</title>
    <link rel="stylesheet" href="styles.css?v=17">
</head>
<body>
    <div class="container">
        <div class="calendar">
            <select id="yearSelector" class="year-selector">
                <option value="recent">近一年</option>
            </select>
            <div class="months"></div>
            <div class="content">
                <div class="weekdays">
                    <div></div>
                    <div>Mon</div>
                    <div></div>
                    <div>Wed</div>
                    <div></div>
                    <div>Fri</div>
                    <div></div>
                </div>
                <div class="weeks"></div>
            </div>
            <div class="legend">
                <div class="legend-leave">
                    <div class="legend-square" data-level="6"></div>
                    <span>Days of leave <span class="days-over-17-text">(0 days)</span></span>
                </div>
                <div class="legend-business-trip">
                    <div class="legend-square" data-level="5"></div>
                    <span class="business-trip-text">Business trip <span class="days-over-16-text">(0 days)</span></span>
                </div>
                <div class="legend-main">
                    <span>Less</span>
                    <div class="legend-squares">
                        <div class="legend-square" data-level="0"></div>
                        <div class="legend-square" data-level="1"></div>
                        <div class="legend-square" data-level="2"></div>
                        <div class="legend-square" data-level="3"></div>
                        <div class="legend-square" data-level="4"></div>
                    </div>
                    <span>More</span>
                </div>
            </div>
            <div class="calendar-footer">
                <div class="calendar-footer-row">
                    <div id="statsContainer" class="stats-container"></div>
                    <div class="calendar-footer-actions">
                        <button type="button" id="tokenSettingsBtn" class="token-settings-btn" aria-haspopup="dialog" title="GitHub Token 设置">Token</button>
                        <button type="button" id="manualEntryToggle" class="manual-entry-btn" aria-expanded="false">手动录入</button>
                    </div>
                </div>
                <div class="manual-entry-panel-slot">
                    <div id="manualEntryPanel" class="manual-entry-panel" hidden>
                    <label class="entry-field">
                        <span>日期</span>
                        <input type="date" id="entryDate" required>
                    </label>
                    <label class="entry-field">
                        <span>类型</span>
                        <div class="entry-type-group" role="radiogroup" aria-label="录入类型">
                            <button type="button" class="entry-type-btn active" data-type="leave">请假 (17h)</button>
                            <button type="button" class="entry-type-btn" data-type="business_trip">出差 (16h)</button>
                            <button type="button" class="entry-type-btn" data-type="on_site">现场服务</button>
                        </div>
                    </label>
                    <div id="onSiteFields" class="on-site-fields" hidden>
                        <label class="entry-field">
                            <span>开机时间</span>
                            <input type="time" id="entryStartTime" step="1" value="08:30:00">
                        </label>
                        <label class="entry-field">
                            <span>关机时间</span>
                            <input type="time" id="entryEndTime" step="1" value="17:31:00">
                        </label>
                        <label class="entry-field">
                            <span>使用时间</span>
                            <input type="text" id="entryHours" readonly tabindex="-1">
                        </label>
                    </div>
                    <label class="entry-field entry-field-remark">
                        <span>备注</span>
                        <input type="text" id="entryRemark" placeholder="可选，如地点或姓名">
                    </label>
                    <button type="button" id="entrySubmit" class="entry-submit-btn">保存</button>
                    <span id="entryStatus" class="entry-status" role="status"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="tooltip" id="tooltip"></div>
    </div>
    <dialog id="tokenDialog" class="token-dialog">
        <form method="dialog" class="token-dialog-form" id="tokenForm">
            <h3 class="token-dialog-title">GitHub Token 设置</h3>
            <p class="token-dialog-hint">电脑和手机用法相同：首次使用在此填入 GitHub Token，之后点「手动录入」保存即可。Token 只存在本设备浏览器，不会写入仓库。</p>
            <label class="token-dialog-field">
                <span>Personal Access Token</span>
                <input type="password" id="tokenInput" autocomplete="off" inputmode="text" placeholder="ghp_...">
            </label>
            <p class="token-dialog-note">需勾选仓库 <strong>Contents: Read and write</strong> 权限。</p>
            <div class="token-dialog-actions">
                <button type="submit" class="token-dialog-save">保存</button>
                <button type="button" id="tokenClear" class="token-dialog-clear">清除</button>
                <button type="button" id="tokenClose" class="token-dialog-close">关闭</button>
            </div>
            <p id="tokenStatus" class="token-status" role="status"></p>
        </form>
    </dialog>
    <script src="script.js?v=17"></script>
</body>
</html>
